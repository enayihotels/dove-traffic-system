# ───────────────────────────────────────────────────────────────
# Doveland Traffic Control — Render Blueprint
#
# Defines: Postgres + Redis (Key Value) + Django/Channels web
# service + Celery worker + React static site.
#
# To deploy:  Push this file (at repo root) to GitHub, then in
# Render → New + → Blueprint → select the repo. Render reads
# this file and provisions everything.
# ───────────────────────────────────────────────────────────────

databases:
  - name: doveland-db
    databaseName: doveland
    user: doveland
    plan: free          # 1 GB, expires after 30 days. Upgrade to "starter" ($7/mo) for permanent.
    region: oregon    # closest to Nigeria; change to oregon/singapore if you prefer.

services:
  # ── Redis / Key Value (channel layer + cache + Celery broker) ──
  - type: keyvalue
    name: doveland-redis
    plan: free
    region: oregon
    ipAllowList: []     # only allow internal connections (recommended)
    maxmemoryPolicy: allkeys-lru

  # ── Django + Channels web service (HTTP + WebSocket via Daphne) ──
  - type: web
    name: doveland-backend
    runtime: python
    region: oregon
    plan: starter        # $7/mo always-on. Set to "free" for spin-down test.
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: python -m daphne -b 0.0.0.0 -p $PORT config.asgi:application    
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true       # Render generates a strong random key
      - key: ALLOWED_HOSTS
        value: ".onrender.com"    # accepts any *.onrender.com subdomain
      - key: DATABASE_URL
        fromDatabase:
          name: doveland-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: doveland-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false                # set manually after frontend deploys
      - key: ANTHROPIC_API_KEY
        sync: false                # set manually in dashboard (secret)
      - key: SCHOOL_LAT
        value: "8.97227713255338"
      - key: SCHOOL_LNG
        value: "7.47895342331406"
      - key: GEOFENCE_METRES
        value: "300"
      - key: JWT_ACCESS_MINUTES
        value: "60"
      - key: JWT_REFRESH_DAYS
        value: "7"
      - key: WEB_CONCURRENCY
        value: "2"

  # ── Celery worker (notifications + cleanup tasks) ──
  # Comment this whole block out if you want to save $7/mo during testing.
  # The app still works without it; you just lose async notifications and the
  # nightly GPS-snapshot cleanup.
  - type: worker
    name: doveland-worker
    runtime: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: python -m celery -A config worker --loglevel=info --concurrency=2    
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          type: web
          name: doveland-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: doveland-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: doveland-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SCHOOL_LAT
        value: "8.97227713255338"
      - key: SCHOOL_LNG
        value: "7.47895342331406"
      - key: GEOFENCE_METRES
        value: "300"

  # ── React frontend (static site, free) ──
  - type: web
    name: doveland-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html       # SPA fallback so React Router works
    envVars:
      - key: VITE_API_URL
        value: https://doveland-backend.onrender.com/api
      - key: VITE_WS_URL
        value: wss://doveland-backend.onrender.com
      - key: VITE_SCHOOL_LAT
        value: "8.97227713255338"
      - key: VITE_SCHOOL_LNG
        value: "7.47895342331406"
      - key: NODE_VERSION
        value: "20"
      - key: VITE_GEOFENCE
        value: "300"
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
